[pytest]
# Этап 11.7: параллельный прогон по умолчанию.
#
# `-n auto` запускает столько worker'ов, сколько у машины ядер.
# `--dist=loadfile` группирует тесты одного файла на одного worker'а —
# некоторые тесты (admin/components) полагаются на данные, заведённые
# другими тестами того же файла (компоненты не truncate'ятся между
# тестами одного модуля). loadfile предотвращает разъезд таких тестов
# по разным БД-worker'ам.
#
# Каждому worker'у автоматически создаётся своя тестовая БД
# `configurator_pc_test_<worker_id>` (см. tests/conftest.py).
# Первый прогон — медленный (миграции применяются N раз), последующие —
# быстрые (CREATE DATABASE пропускается).
#
# Для отладки одного теста с print'ами/pdb отключайте параллелизм:
#   pytest <path> -n0
# (xdist остаётся подключённым, тесты идут последовательно). Вариант
# `-p no:xdist` без `-o addopts=` не сработает — addopts ниже содержит
# `-n auto`, который без xdist становится unrecognized arg.
addopts = -n auto --dist=loadfile --durations=10

# Этап 3 слияния: `auctions_staging/` — копия QT-кода, не подключена
# к C-PC2 (импорты `app.modules.auctions.*` в C-PC2 отсутствуют). Pytest
# должен её игнорировать; перенос в каноничные места — Этапы 4-9.
norecursedirs = auctions_staging .business .git node_modules .venv

# Реестр маркеров, чтобы pytest не ругался на pytest.mark.live.
# live — тесты, которые делают реальный сетевой вызов (OpenAI) и тратят
# деньги. Они автоматически пропускаются, пока не задан RUN_LIVE_TESTS=1.
markers =
    live: тест делает реальный внешний вызов (OpenAI); пропускается без RUN_LIVE_TESTS=1
