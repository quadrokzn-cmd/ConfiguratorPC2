[pytest]
# Реестр маркеров, чтобы pytest не ругался на pytest.mark.live.
# live — тесты, которые делают реальный сетевой вызов (OpenAI) и тратят
# деньги. Они автоматически пропускаются, пока не задан RUN_LIVE_TESTS=1.
markers =
    live: тест делает реальный внешний вызов (OpenAI); пропускается без RUN_LIVE_TESTS=1
