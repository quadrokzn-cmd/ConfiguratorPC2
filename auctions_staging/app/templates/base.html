<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}QuadroTech{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <script src="https://unpkg.com/alpinejs@3.13.10/dist/cdn.min.js" defer></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <header class="bg-white border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/" class="font-semibold text-lg">QuadroTech</a>
                <nav class="flex items-center gap-4 text-sm">
                    <a href="/auctions" class="hover:text-blue-600 {% if active == 'auctions' %}text-blue-600 font-medium{% endif %}">Аукционы</a>
                    <a href="/nomenclature" class="hover:text-blue-600 {% if active == 'nomenclature' %}text-blue-600 font-medium{% endif %}">Номенклатура</a>
                    <a href="/settings" class="hover:text-blue-600 {% if active == 'settings' %}text-blue-600 font-medium{% endif %}">Настройки</a>
                </nav>
            </div>
            <div class="text-sm text-slate-600">{{ username }}</div>
        </div>
    </header>
    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
