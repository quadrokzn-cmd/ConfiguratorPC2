services:
  postgres:
    image: postgres:16
    container_name: quadrotech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quadrotech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quadrotech}
      POSTGRES_DB: ${POSTGRES_DB:-quadrotech}
    ports:
      - "5432:5432"
    volumes:
      - quadrotech_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quadrotech}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: quadrotech-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://quadrotech:quadrotech@postgres:5432/quadrotech}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  quadrotech_pgdata:
