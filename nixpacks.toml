# Явно указываем что это гибридный Python + Node проект.
# Без этого Nixpacks определяет проект только как Node (по package.json)
# и не ставит Python/pip, из-за чего билд падает.

providers = ["python", "node"]

[phases.setup]
nixPkgs = ["python311", "nodejs_18", "gcc"]

[phases.build]
cmds = ["npm run build:css"]
