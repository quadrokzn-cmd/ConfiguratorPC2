<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — КВАДРО-ТЕХ</title>
  <link rel="stylesheet" href="{{ static_url('static/dist/main.css') }}">
</head>
<body class="portal-theme min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-h1 text-ink-primary">КВАДРО-ТЕХ</div>
      <div class="text-small text-ink-muted">портал</div>
    </div>

    <form method="post" action="/login" class="card card-pad-lg space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="hidden" name="next" value="{{ next or '' }}">

      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <div>
        <label class="label" for="lf-login">Логин</label>
        <input id="lf-login" type="text" name="login" autofocus required class="input">
      </div>
      <div>
        <label class="label" for="lf-pass">Пароль</label>
        <input id="lf-pass" type="password" name="password" required class="input">
      </div>
      <button type="submit" class="btn btn-lg btn-primary w-full">Войти</button>
    </form>
  </div>
</body>
</html>
